<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Binance SPOT + FUTURES Delta Analyzer</title>
<style>
  body { font-family: Arial; background: #0e0e0e; color: #eee; margin:0; padding:0; }
  .container { max-width: 900px; margin: 30px auto; padding:20px; background:#1b1b1b; border-radius:10px; box-shadow:0 0 20px #000; }
  h2 { text-align:center; color:#00bfff; margin-bottom:20px; }

  .form-row { display:flex; flex-wrap:wrap; gap:15px; justify-content:center; margin-bottom:15px; }
  .form-group { flex:1 1 200px; position:relative; }
  label { display:block; margin-bottom:5px; font-weight:bold; color:#ccc; }
  input, select, button { width:100%; padding:8px; border-radius:5px; border:none; font-size:14px; }
  input, select { background:#222; color:#eee; }
  button { background:#00bfff; color:#111; font-weight:bold; cursor:pointer; transition:0.3s; }
  button:hover { background:#009acd; }

  #symbolList { position:absolute; background:#222; border:1px solid #555; max-height:150px; overflow-y:auto; display:none; z-index:1000; width:100%; }
  #symbolList div { padding:5px; cursor:pointer; }
  #symbolList div:hover { background:#444; }

  #results { display:flex; flex-wrap:wrap; gap:20px; margin-top:20px; justify-content:center; }
  .block { flex:1 1 250px; background:#111; border:1px solid #444; border-radius:8px; padding:10px; }
  .header { font-size:1.2em; font-weight:bold; margin-bottom:5px; text-align:center; color:#00bfff; }
  .buy { color:#00ff88; font-weight:bold; text-align:center; }
  .sell { color:#ff5555; font-weight:bold; text-align:center; }
  .delta { color:#ffff55; font-weight:bold; text-align:center; }
  .signal { color:#ffcc00; font-weight:bold; text-align:center; margin-top:10px; }

  .log { background:#111; border:1px solid #444; padding:10px; max-height:300px; overflow-y:auto; font-size:12px; margin-top:10px; border-radius:5px; color:#90ee90; font-family:monospace; transition:0.3s; }
  .log-hidden { display:none; }
  #toggleLogBtn { margin-top:5px; width:150px; display:block; margin-left:auto; margin-right:auto; }
</style>
</head>
<body>

<div class="container">
  <h2>Binance Delta Analyzer (SPOT + FUTURES)</h2>

  <div class="form-row">
    <div class="form-group">
      <label>Монета:</label>
      <input id="symbol" placeholder="ETHUSDT" oninput="showSuggestions()" autocomplete="off">
      <div id="symbolList"></div>
    </div>
    <div class="form-group">
      <label>Start Time:</label>
      <input type="datetime-local" id="startTime">
    </div>
    <div class="form-group">
      <label>End Time (optional):</label>
      <input type="datetime-local" id="endTime">
    </div>
    <div class="form-group">
      <label>Режим:</label>
      <select id="mode">
        <option value="history">Variant 1 (start → end)</option>
        <option value="live">Variant 4 (start → now → live)</option>
      </select>
    </div>
  </div>

  <div style="text-align:center; margin-bottom:20px;">
    <button onclick="start()">START</button>
  </div>

  <div id="results">
    <div class="block" id="spotBlock">
      <div class="header">SPOT</div>
      <div class="buy">Buy: 0</div>
      <div class="sell">Sell: 0</div>
      <div class="delta">Delta: 0</div>
    </div>

    <div class="block" id="futBlock">
      <div class="header">FUTURES</div>
      <div class="buy">Buy: 0</div>
      <div class="sell">Sell: 0</div>
      <div class="delta">Delta: 0</div>
    </div>

    <div class="block" id="totalBlock">
      <div class="header">Общий результат</div>
      <div class="buy">Buy: 0</div>
      <div class="sell">Sell: 0</div>
      <div class="delta">Delta: 0</div>
    </div>

    <div class="block" id="comboBlock">
      <div class="header">Комбинация дельт</div>
      <div class="signal" id="comboSignal">—</div>
    </div>
  </div>

  <h3>Подробный лог</h3>
  <div class="log" id="log"></div>
  <button id="toggleLogBtn" onclick="toggleLog()">Свернуть лог</button>
</div>

<script>
let state = {
  buy_spot:0, sell_spot:0, lastId_spot:null,
  buy_fut:0, sell_fut:0, lastId_fut:null,
  ws_spot:null, ws_fut:null,
  spotPrice:0, futPrice:0
};

let allSymbols=[], allFutSymbols=[];
const sleep = ms => new Promise(r=>setTimeout(r,ms));

function logMessage(msg){
  const logDiv = document.getElementById('log');
  const time = new Date().toLocaleTimeString();
  logDiv.innerHTML += `[${time}] ${msg}<br>`;
  logDiv.scrollTop = logDiv.scrollHeight;
}

function toggleLog(){
  const logDiv = document.getElementById('log');
  const btn = document.getElementById('toggleLogBtn');
  if(logDiv.classList.contains('log-hidden')){
    logDiv.classList.remove('log-hidden');
    btn.textContent = 'Свернуть лог';
  } else {
    logDiv.classList.add('log-hidden');
    btn.textContent = 'Развернуть лог';
  }
}

async function loadSymbols(){
  const spotData = await fetch('https://api.binance.com/api/v3/exchangeInfo').then(r=>r.json());
  allSymbols = spotData.symbols.map(s=>s.symbol);
  const futData = await fetch('https://fapi.binance.com/fapi/v1/exchangeInfo').then(r=>r.json());
  allFutSymbols = futData.symbols.map(s=>s.symbol);
}
loadSymbols();

function showSuggestions(){
  const input = document.getElementById('symbol');
  const list = document.getElementById('symbolList');
  const val = input.value.toUpperCase();
  if(!val){ list.style.display='none'; return; }
  const matches = [...allSymbols,...allFutSymbols].filter(s=>s.includes(val)).slice(0,10);
  list.innerHTML = matches.map(s=>`<div onclick="selectSymbol('${s}')">${s}</div>`).join('');
  list.style.display = matches.length ? 'block' : 'none';
}
function selectSymbol(sym){
  document.getElementById('symbol').value = sym;
  document.getElementById('symbolList').style.display='none';
}

// Формат числа с пробелами
function formatNumber(n){
  return n.toLocaleString('ru-RU', {maximumFractionDigits: 2});
}

// Обновление UI
function updateUI(){
  const deltaSpot = state.buy_spot - state.sell_spot;
  const deltaFut = state.buy_fut - state.sell_fut;
  const totalBuy = state.buy_spot + state.buy_fut;
  const totalSell = state.sell_spot + state.sell_fut;
  const totalDelta = totalBuy - totalSell;

  document.querySelector('#spotBlock .buy').textContent = `Buy: ${formatNumber(state.buy_spot)}`;
  document.querySelector('#spotBlock .sell').textContent = `Sell: ${formatNumber(state.sell_spot)}`;
  document.querySelector('#spotBlock .delta').textContent = `Delta: ${formatNumber(deltaSpot)} (${formatNumber(deltaSpot*state.spotPrice)} USDT)`;

  document.querySelector('#futBlock .buy').textContent = `Buy: ${formatNumber(state.buy_fut)}`;
  document.querySelector('#futBlock .sell').textContent = `Sell: ${formatNumber(state.sell_fut)}`;
  document.querySelector('#futBlock .delta').textContent = `Delta: ${formatNumber(deltaFut)} (${formatNumber(deltaFut*state.futPrice)} USDT)`;

  document.querySelector('#totalBlock .buy').textContent = `Buy: ${formatNumber(totalBuy)}`;
  document.querySelector('#totalBlock .sell').textContent = `Sell: ${formatNumber(totalSell)}`;
  document.querySelector('#totalBlock .delta').textContent = `Delta: ${formatNumber(totalDelta)} (${formatNumber(totalDelta*state.spotPrice)} USDT)`;

  updateComboSignal();
}

// Обновление комбинации дельт
function updateComboSignal(){
  const deltaSpot = state.buy_spot - state.sell_spot;
  const deltaFut  = state.buy_fut - state.sell_fut;
  const signalDiv = document.getElementById('comboSignal');

  let spotSign = deltaSpot >= 0 ? '+' : '−';
  let futSign  = deltaFut  >= 0 ? '+' : '−';

  let message = '';
  if(spotSign==='+' && futSign==='+') message = 'Чистый бычий рынок — можно входить в лонг';
  else if(spotSign==='+' && futSign==='−') message = 'Аккумуляция китами, возможно скрытый рост';
  else if(spotSign==='−' && futSign==='+') message = 'Раздача на хаях, но деньги зашли — осторожно, возможен откат';
  else if(spotSign==='−' && futSign==='−') message = 'Сильное давление продавцов — сигнал выйти или шорт';

  signalDiv.textContent = message;
}

// Получение текущей цены для расчета USDT
async function loadPrices(symbol){
  try{
    const respSpot = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
    const dataSpot = await respSpot.json();
    state.spotPrice = parseFloat(dataSpot.price);

    const respFut = await fetch(`https://fapi.binance.com/fapi/v1/ticker/price?symbol=${symbol}`);
    const dataFut = await respFut.json();
    state.futPrice = parseFloat(dataFut.price);
  }catch(e){
    logMessage('Ошибка при получении цен: ' + e);
    state.spotPrice = 0;
    state.futPrice = 0;
  }
}

// REST обработка
async function processREST(symbol, market, startTime, endTime){
  const baseUrl = market==='spot'
    ? 'https://api.binance.com/api/v3/aggTrades'
    : 'https://fapi.binance.com/fapi/v1/aggTrades';
  let fromId = null;
  let finished = false;
  let totalTrades=0;
  const targetEnd = endTime || Date.now();

  logMessage(`Начало REST-запроса для ${market.toUpperCase()} с ${new Date(startTime).toLocaleString()} по ${new Date(targetEnd).toLocaleString()}`);

  while(!finished){
    try{
      let url = `${baseUrl}?symbol=${symbol}&limit=1000`;
      if(fromId) url += `&fromId=${fromId}`;
      else url += `&startTime=${startTime}`;

      const trades = await fetch(url).then(r=>r.json());
      if(!trades.length){ finished = true; break; }

      for(let t of trades){
        const qty = parseFloat(t.q);
        if(t.m){ if(market==='spot') state.sell_spot+=qty; else state.sell_fut+=qty; }
        else { if(market==='spot') state.buy_spot+=qty; else state.buy_fut+=qty; }

        if(market==='spot') state.lastId_spot=t.a; else state.lastId_fut=t.a;
        totalTrades++;
        if(t.T > targetEnd){ finished=true; break; }
      }

      updateUI();
      fromId = (market==='spot'?state.lastId_spot:state.lastId_fut)+1;
      const lastTime = new Date(trades[trades.length-1].T).toLocaleString();
      logMessage(`${market.toUpperCase()}: Обработано ${totalTrades} сделок, последний ID=${fromId-1}, время последней сделки: ${lastTime}`);

      await sleep(1000);
    } catch(err){
      logMessage(`${market.toUpperCase()} REST: Ошибка fetch - ${err}`);
      await sleep(2000);
    }
  }
  logMessage(`Завершение REST для ${market.toUpperCase()} (${totalTrades} сделок)`);
}

// WebSocket обработка
function startWebSocket(symbol, market){
  const baseUrl = market==='spot'
    ? `wss://stream.binance.com:9443/ws/${symbol.toLowerCase()}@aggTrade`
    : `wss://fstream.binance.com/ws/${symbol.toLowerCase()}@aggTrade`;

  function connect(){
    const ws = new WebSocket(baseUrl);
    ws.onopen = ()=> logMessage(`WebSocket подключен: ${market.toUpperCase()}`);
    ws.onmessage = e=>{
      const t = JSON.parse(e.data);
      if(market==='spot' && t.a <= state.lastId_spot) return;
      if(market==='futures' && t.a <= state.lastId_fut) return;

      const qty = parseFloat(t.q);
      if(t.m){ if(market==='spot') state.sell_spot+=qty; else state.sell_fut+=qty; }
      else { if(market==='spot') state.buy_spot+=qty; else state.buy_fut+=qty; }

      if(market==='spot') state.lastId_spot=t.a; else state.lastId_fut=t.a;
      updateUI();
    };
    ws.onclose = ()=> {
      logMessage(`${market.toUpperCase()} WS: соединение разорвано, переподключение через 3 сек...`);
      setTimeout(connect,3000);
    };
    ws.onerror = (err)=> {
      logMessage(`${market.toUpperCase()} WS: ошибка ${err}, переподключение через 3 сек...`);
      ws.close();
    };

    if(market==='spot') state.ws_spot=ws;
    else state.ws_fut=ws;
  }

  connect();
}

// START
async function start(){
  state.buy_spot=state.sell_spot=0;
  state.buy_fut=state.sell_fut=0;
  updateUI();
  document.getElementById('log').innerHTML='';

  const symbol = document.getElementById('symbol').value.toUpperCase();
  const startInput = document.getElementById('startTime').value;
  const endInput = document.getElementById('endTime').value;
  const mode = document.getElementById('mode').value;

  if(!symbol || !startInput){ alert('Выберите монету и стартовое время'); return; }

  const startTime = new Date(startInput).getTime();
  const endTime = endInput ? new Date(endInput).getTime() : null;

  if(!allSymbols.includes(symbol)) { alert('Монета не найдена на SPOT'); return; }
  if(!allFutSymbols.includes(symbol)) { alert('Монета не найдена на FUTURES'); return; }

  await loadPrices(symbol);

  if(mode === 'history'){
    await Promise.all([
      processREST(symbol,'spot',startTime,endTime),
      processREST(symbol,'futures',startTime,endTime)
    ]);
  } else if(mode === 'live'){
    const spotPromise = processREST(symbol,'spot',startTime,endTime || Date.now()).then(()=> startWebSocket(symbol,'spot'));
    const futPromise  = processREST(symbol,'futures',startTime,endTime || Date.now()).then(()=> startWebSocket(symbol,'futures'));
    await Promise.all([spotPromise,futPromise]);
  }

  logMessage('Обработка завершена. В режиме live данные обновляются автоматически.');
}
</script>
</body>
</html>
